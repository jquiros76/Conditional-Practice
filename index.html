<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conditionals Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a25;
    --border: #2a2a40;
    --accent1: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #aaff00;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --first: #00e5ff;
    --second: #b47fff;
    --third: #ff8c42;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* BG noise */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
}

.container {
max-width: 820px;
margin: 0 auto;
padding: 40px 20px 80px;
position: relative;
z-index: 1;
}

/* HEADER */
header {
text-align: center;
margin-bottom: 48px;
animation: fadeDown 0.6s ease both;
}

.badge {
display: inline-block;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
letter-spacing: 3px;
color: var(–accent3);
border: 1px solid var(–accent3);
padding: 4px 12px;
margin-bottom: 16px;
text-transform: uppercase;
}

h1 {
font-size: clamp(2rem, 6vw, 3.5rem);
font-weight: 800;
line-height: 1.05;
margin-bottom: 8px;
}

h1 span {
color: var(–accent1);
-webkit-text-stroke: 1px var(–accent1);
}

.subtitle {
color: var(–muted);
font-size: 15px;
}

/* TABS */
.tabs {
display: flex;
gap: 4px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 4px;
margin-bottom: 36px;
animation: fadeDown 0.6s 0.1s ease both;
}

.tab {
flex: 1;
padding: 10px 8px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘Syne’, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
letter-spacing: 0.5px;
}

.tab.active {
background: var(–card);
color: var(–text);
border: 1px solid var(–border);
}

.tab[data-type=“1st”].active { color: var(–first); border-color: var(–first); }
.tab[data-type=“2nd”].active { color: var(–second); border-color: var(–second); }
.tab[data-type=“3rd”].active { color: var(–third); border-color: var(–third); }
.tab[data-type=“mixed”].active { color: var(–accent3); border-color: var(–accent3); }

/* THEORY CARD */
.theory-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 24px;
margin-bottom: 32px;
animation: fadeUp 0.4s ease both;
}

.theory-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 16px;
}

.theory-dot {
width: 10px; height: 10px;
border-radius: 50%;
}

.type-1st .theory-dot { background: var(–first); box-shadow: 0 0 8px var(–first); }
.type-2nd .theory-dot { background: var(–second); box-shadow: 0 0 8px var(–second); }
.type-3rd .theory-dot { background: var(–third); box-shadow: 0 0 8px var(–third); }
.type-mixed .theory-dot { background: var(–accent3); box-shadow: 0 0 8px var(–accent3); }

.theory-title {
font-size: 14px;
font-weight: 600;
color: var(–text);
}

.formula {
font-family: ‘Space Mono’, monospace;
font-size: 13px;
background: var(–card);
border-left: 3px solid;
padding: 12px 16px;
margin-bottom: 10px;
border-radius: 0 2px 2px 0;
color: var(–text);
}

.type-1st .formula { border-color: var(–first); }
.type-2nd .formula { border-color: var(–second); }
.type-3rd .formula { border-color: var(–third); }

.usage-text {
font-size: 13px;
color: var(–muted);
line-height: 1.6;
}

.example-sentence {
font-size: 13px;
color: var(–text);
margin-top: 8px;
padding: 8px 12px;
background: rgba(255,255,255,0.03);
border-radius: 2px;
font-style: italic;
}

/* PROGRESS */
.progress-bar-wrap {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
height: 6px;
margin-bottom: 32px;
overflow: hidden;
}

.progress-bar {
height: 100%;
background: linear-gradient(90deg, var(–accent1), var(–accent3));
border-radius: 2px;
transition: width 0.4s ease;
}

.progress-label {
display: flex;
justify-content: space-between;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-bottom: 8px;
}

/* QUESTION CARD */
.question-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 32px;
margin-bottom: 20px;
animation: fadeUp 0.3s ease both;
position: relative;
overflow: hidden;
}

.question-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.type-1st .question-card::before { background: var(–first); }
.type-2nd .question-card::before { background: var(–second); }
.type-3rd .question-card::before { background: var(–third); }
.type-mixed .question-card::before { background: linear-gradient(90deg, var(–first), var(–second), var(–third)); }

.q-meta {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 20px;
}

.q-type-tag {
font-family: ‘Space Mono’, monospace;
font-size: 10px;
letter-spacing: 1.5px;
padding: 3px 8px;
border: 1px solid;
text-transform: uppercase;
}

.type-1st .q-type-tag { color: var(–first); border-color: var(–first); }
.type-2nd .q-type-tag { color: var(–second); border-color: var(–second); }
.type-3rd .q-type-tag { color: var(–third); border-color: var(–third); }

.q-mode-tag {
font-family: ‘Space Mono’, monospace;
font-size: 10px;
color: var(–muted);
letter-spacing: 1px;
}

.question-text {
font-size: 1.15rem;
font-weight: 600;
line-height: 1.5;
margin-bottom: 24px;
color: var(–text);
}

.blank {
display: inline-block;
min-width: 140px;
border-bottom: 2px solid var(–accent1);
color: var(–accent1);
font-family: ‘Space Mono’, monospace;
padding: 0 4px;
text-align: center;
}

/* INPUT */
.answer-input {
width: 100%;
background: var(–card);
border: 1px solid var(–border);
border-radius: 2px;
padding: 14px 16px;
font-family: ‘Space Mono’, monospace;
font-size: 14px;
color: var(–text);
outline: none;
transition: border-color 0.2s;
margin-bottom: 16px;
}

.answer-input:focus { border-color: var(–accent1); }
.answer-input.correct { border-color: var(–accent3); background: rgba(170,255,0,0.05); }
.answer-input.incorrect { border-color: var(–accent2); background: rgba(255,77,109,0.05); }

/* MULTIPLE CHOICE */
.options-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 16px;
}

@media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }

.option-btn {
background: var(–card);
border: 1px solid var(–border);
border-radius: 2px;
padding: 12px 16px;
color: var(–text);
font-family: ‘Space Mono’, monospace;
font-size: 12px;
cursor: pointer;
text-align: left;
transition: all 0.15s;
line-height: 1.4;
}

.option-btn:hover:not(:disabled) { border-color: var(–accent1); color: var(–accent1); }
.option-btn.correct { border-color: var(–accent3); color: var(–accent3); background: rgba(170,255,0,0.08); }
.option-btn.incorrect { border-color: var(–accent2); color: var(–accent2); background: rgba(255,77,109,0.08); }
.option-btn:disabled { cursor: default; }

/* FEEDBACK */
.feedback {
padding: 14px 16px;
border-radius: 2px;
font-size: 13px;
margin-top: 12px;
display: none;
animation: fadeUp 0.2s ease both;
line-height: 1.6;
}

.feedback.correct { background: rgba(170,255,0,0.08); border: 1px solid var(–accent3); color: var(–accent3); }
.feedback.incorrect { background: rgba(255,77,109,0.08); border: 1px solid var(–accent2); color: var(–accent2); }

.feedback .correct-answer {
font-family: ‘Space Mono’, monospace;
font-weight: 700;
margin-top: 4px;
display: block;
}

/* BUTTONS */
.btn-row {
display: flex;
gap: 10px;
margin-top: 20px;
}

.btn {
padding: 12px 24px;
border: 1px solid;
background: transparent;
font-family: ‘Syne’, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
border-radius: 2px;
transition: all 0.15s;
letter-spacing: 0.5px;
}

.btn-primary {
border-color: var(–accent1);
color: var(–accent1);
}
.btn-primary:hover { background: var(–accent1); color: var(–bg); }

.btn-secondary {
border-color: var(–border);
color: var(–muted);
}
.btn-secondary:hover { border-color: var(–text); color: var(–text); }

.btn-next {
border-color: var(–accent3);
color: var(–accent3);
}
.btn-next:hover { background: var(–accent3); color: var(–bg); }

/* SCORE CARD */
.score-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 48px 32px;
text-align: center;
animation: fadeUp 0.5s ease both;
}

.score-big {
font-size: 80px;
font-weight: 800;
line-height: 1;
margin-bottom: 8px;
}

.score-label {
font-family: ‘Space Mono’, monospace;
font-size: 12px;
color: var(–muted);
letter-spacing: 2px;
margin-bottom: 32px;
}

.score-details {
display: flex;
justify-content: center;
gap: 40px;
margin-bottom: 40px;
}

.score-stat { text-align: center; }
.score-stat-num { font-size: 28px; font-weight: 800; }
.score-stat-label { font-size: 12px; color: var(–muted); font-family: ‘Space Mono’, monospace; }

/* ANIMATIONS */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-16px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="badge">🔗 English Practice</div>
    <h1>CONDITIONAL<br><span>SENTENCES</span></h1>
    <p class="subtitle">1st · 2nd · 3rd — Practice & Master</p>
  </header>

  <!-- TABS -->

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="1st" onclick="selectType('1st', this)">1st Conditional</button>
    <button class="tab" data-type="2nd" onclick="selectType('2nd', this)">2nd Conditional</button>
    <button class="tab" data-type="3rd" onclick="selectType('3rd', this)">3rd Conditional</button>
    <button class="tab" data-type="mixed" onclick="selectType('mixed', this)">🎲 Mixed</button>
  </div>

  <!-- THEORY + PRACTICE -->

  <div id="app"></div>

</div>

<script>
const THEORY = {
  '1st': {
    title: '1st Conditional — Real / Possible',
    formula: 'If + Simple Present → will + base verb',
    usage: 'Para situaciones reales y posibles en el futuro.',
    example: '"If the client calls, I will send the proposal immediately."',
    color: 'var(--first)'
  },
  '2nd': {
    title: '2nd Conditional — Hypothetical / Unlikely',
    formula: 'If + Simple Past → would + base verb',
    usage: 'Para situaciones imaginarias o poco probables en el presente/futuro.',
    example: '"If I had more time, I would build a better chatbot."',
    color: 'var(--second)'
  },
  '3rd': {
    title: '3rd Conditional — Unreal Past',
    formula: 'If + Past Perfect → would have + past participle',
    usage: 'Para hablar de situaciones pasadas que no ocurrieron.',
    example: '"If I had launched earlier, I would have gotten more clients."',
    color: 'var(--third)'
  }
};

const QUESTIONS = [
  // 1ST CONDITIONAL
  { type: '1st', mode: 'fill', text: 'If the chatbot __ (work) well, more clients will sign up.', answer: 'works', hint: 'Simple Present' },
  { type: '1st', mode: 'fill', text: 'If she __ (send) the email tonight, they will respond tomorrow.', answer: 'sends', hint: 'Simple Present' },
  { type: '1st', mode: 'fill', text: 'If we __ (launch) the app next month, we will get early users.', answer: 'launch', hint: 'Simple Present' },
  { type: '1st', mode: 'mc', text: 'If you study hard, you __ pass the exam.',
    options: ['will pass', 'would pass', 'would have passed', 'had passed'], answer: 'will pass' },
  { type: '1st', mode: 'mc', text: 'If it __ tomorrow, we will cancel the meeting.',
    options: ['rains', 'rained', 'had rained', 'will rain'], answer: 'rains' },
  { type: '1st', mode: 'fill', text: 'We __ (lose) the client if we don\'t respond quickly.', answer: 'will lose', hint: 'will + base verb' },

  // 2ND CONDITIONAL
  { type: '2nd', mode: 'fill', text: 'If I __ (have) $10,000, I would hire a developer.', answer: 'had', hint: 'Simple Past' },
  { type: '2nd', mode: 'fill', text: 'If she __ (know) the answer, she would tell us.', answer: 'knew', hint: 'Simple Past' },
  { type: '2nd', mode: 'fill', text: 'If we __ (be) in San José, we would meet in person.', answer: 'were', hint: 'Simple Past (use "were" for all persons)' },
  { type: '2nd', mode: 'mc', text: 'If I spoke English fluently, I __ more international clients.',
    options: ['would get', 'will get', 'would have gotten', 'get'], answer: 'would get' },
  { type: '2nd', mode: 'mc', text: 'If she __ the CEO, she would change the policy.',
    options: ['were', 'is', 'will be', 'has been'], answer: 'were' },
  { type: '2nd', mode: 'fill', text: 'They __ (not / accept) the deal if the price were too high.', answer: 'would not accept', hint: 'would + base verb' },

  // 3RD CONDITIONAL
  { type: '3rd', mode: 'fill', text: 'If I __ (study) more, I would have passed the test.', answer: 'had studied', hint: 'Past Perfect (had + past participle)' },
  { type: '3rd', mode: 'fill', text: 'If she __ (arrive) on time, she would have gotten the job.', answer: 'had arrived', hint: 'Past Perfect' },
  { type: '3rd', mode: 'fill', text: 'We __ (win) the contract if we had prepared better.', answer: 'would have won', hint: 'would have + past participle' },
  { type: '3rd', mode: 'mc', text: 'If he had invested earlier, he __ a lot of money.',
    options: ['would have made', 'would make', 'will make', 'had made'], answer: 'would have made' },
  { type: '3rd', mode: 'mc', text: 'If they __ the email, they would have replied.',
    options: ['had read', 'read', 'have read', 'were reading'], answer: 'had read' },
  { type: '3rd', mode: 'fill', text: 'If the server __ (not / crash), we would have kept the clients.', answer: 'had not crashed', hint: 'Past Perfect negative' },
];

let currentType = '1st';
let currentQ = 0;
let score = 0;
let answered = false;
let questions = [];

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  startSession();
}

function getQuestions(type) {
  if (type === 'mixed') return shuffle([...QUESTIONS]);
  return shuffle(QUESTIONS.filter(q => q.type === type));
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function startSession() {
  questions = getQuestions(currentType);
  currentQ = 0;
  score = 0;
  answered = false;
  renderQuestion();
}

function renderTheory(type) {
  if (type === 'mixed') return `<div style="text-align:center;padding:16px 0;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;">MODO MIXTO — Todos los condicionales combinados 🎲</div>`;
  const t = THEORY[type];
  return `
  <div class="theory-card type-${type}">
    <div class="theory-header">
      <div class="theory-dot"></div>
      <span class="theory-title">${t.title}</span>
    </div>
    <div class="formula">${t.formula}</div>
    <p class="usage-text">${t.usage}</p>
    <div class="example-sentence">${t.example}</div>
  </div>`;
}

function renderQuestion() {
  const app = document.getElementById('app');
  if (currentQ >= questions.length) { renderScore(); return; }

  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);

  let inputHtml = '';
  if (q.mode === 'fill') {
    inputHtml = `
      <input class="answer-input" id="answerInput" placeholder="Type your answer..." autocomplete="off"
        onkeydown="if(event.key==='Enter' && !${answered})checkAnswer()">
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);">💡 Hint: ${q.hint}</div>`;
  } else {
    const opts = shuffle([...q.options]);
    inputHtml = `<div class="options-grid">${opts.map(o =>
      `<button class="option-btn" onclick="checkMC(this,'${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}')">
        ${o}
      </button>`).join('')}</div>`;
  }

  const qType = q.type === '1st' ? '1st Conditional' : q.type === '2nd' ? '2nd Conditional' : '3rd Conditional';

  app.innerHTML = `
    ${renderTheory(currentType)}
    <div class="progress-label">
      <span>Question ${currentQ + 1} / ${total}</span>
      <span>Score: ${score}</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="question-card type-${q.type}" id="qCard">
      <div class="q-meta">
        <span class="q-type-tag">${qType}</span>
        <span class="q-mode-tag">${q.mode === 'fill' ? '✏️ Fill in' : '☑️ Multiple Choice'}</span>
      </div>
      <p class="question-text">${q.text.replace('__', '<span class="blank">___</span>')}</p>
      ${inputHtml}
      <div class="feedback" id="feedback"></div>
      <div class="btn-row" id="btnRow">
        ${q.mode === 'fill' ? `<button class="btn btn-primary" onclick="checkAnswer()">Check ✓</button>` : ''}
        <button class="btn btn-secondary" onclick="skipQuestion()">Skip →</button>
      </div>
    </div>`;

  answered = false;
  if (q.mode === 'fill') {
    setTimeout(() => { const inp = document.getElementById('answerInput'); if(inp) inp.focus(); }, 100);
  }
}

function checkAnswer() {
  if (answered) return;
  const input = document.getElementById('answerInput');
  const q = questions[currentQ];
  const userAns = input.value.trim().toLowerCase();
  const correct = q.answer.toLowerCase();
  const isCorrect = userAns === correct;

  answered = true;
  input.classList.add(isCorrect ? 'correct' : 'incorrect');
  showFeedback(isCorrect, q.answer);
  if (isCorrect) score++;
  showNextBtn();
}

function checkMC(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? 'correct' : 'incorrect');

  // highlight correct if wrong
  if (!isCorrect) {
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent.trim() === correct) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  showFeedback(isCorrect, correct);
  if (isCorrect) score++;
  showNextBtn();
}

function showFeedback(isCorrect, correctAns) {
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ Correct! Well done.';
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = `❌ Not quite.<span class="correct-answer">✓ ${correctAns}</span>`;
  }
}

function showNextBtn() {
  const btnRow = document.getElementById('btnRow');
  const q = questions[currentQ];
  btnRow.innerHTML = `<button class="btn btn-next" onclick="nextQuestion()">Next →</button>`;
}

function skipQuestion() {
  answered = true;
  const q = questions[currentQ];
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback incorrect';
  fb.innerHTML = `Skipped.<span class="correct-answer">✓ ${q.answer}</span>`;
  showNextBtn();
}

function nextQuestion() {
  currentQ++;
  answered = false;
  renderQuestion();
}

function renderScore() {
  const app = document.getElementById('app');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '💪' : '📚';
  const colorClass = pct >= 80 ? 'var(--accent3)' : pct >= 60 ? 'var(--first)' : 'var(--accent2)';

  app.innerHTML = `
    <div class="score-card">
      <div class="score-big" style="color:${colorClass}">${emoji}</div>
      <div class="score-big" style="color:${colorClass}">${pct}%</div>
      <div class="score-label">FINAL SCORE</div>
      <div class="score-details">
        <div class="score-stat">
          <div class="score-stat-num" style="color:var(--accent3)">${score}</div>
          <div class="score-stat-label">CORRECT</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num" style="color:var(--accent2)">${total - score}</div>
          <div class="score-stat-label">INCORRECT</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num">${total}</div>
          <div class="score-stat-label">TOTAL</div>
        </div>
      </div>
      <div class="btn-row" style="justify-content:center;gap:12px">
        <button class="btn btn-next" onclick="startSession()">Try Again ↺</button>
        <button class="btn btn-secondary" onclick="selectType('mixed', document.querySelector('[data-type=mixed]'))">Mixed Mode 🎲</button>
      </div>
    </div>`;
}

// INIT
startSession();
</script>

</body>
</html>
